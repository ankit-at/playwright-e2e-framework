# Dependabot — automated dependency and GitHub Actions version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm dependencies (Playwright, TypeScript, eslint, MCP SDK, …)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut review noise.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # The actions pinned in .github/workflows/* (checkout, setup-node, …)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
    groups:
      # Batch every GitHub Actions bump into ONE PR instead of one-per-action.
      github-actions:
        patterns: ["*"]

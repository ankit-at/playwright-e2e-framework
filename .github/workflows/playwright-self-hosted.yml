name: Playwright Self-Hosted

# Manual-trigger only: this workflow needs a self-hosted runner labelled
# [self-hosted, linux, playwright]. None is currently registered, so push/PR/schedule
# triggers were removed to stop jobs hanging in `queued` forever on every push.
# Re-add those triggers once a runner is online.
on:
  workflow_dispatch:

env:
  NODE_OPTIONS: --disable-warning=DEP0040

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, linux, playwright]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        env:
          CI: true
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}
          PROTO_USER: ${{ secrets.PROTO_USER }}
          PROTO_PASS: ${{ secrets.PROTO_PASS }}
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          YAHOO_PASSWORD: ${{ secrets.YAHOO_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

      - name: Generate Allure report
        if: success()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

  load-tests:
    runs-on: [self-hosted, linux, playwright]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run performance tests
        run: npx playwright test tests/performance.spec.ts --reporter=line
        env:
          CI: true
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}

name: Playwright Self-Hosted

# Manual-trigger only (workflow_dispatch). This runs on a SELF-HOSTED runner and
# the repo is PUBLIC, so the workflow is deliberately hardened (see issue #2):
#   - No automatic / untrusted triggers — no push, pull_request, pull_request_target,
#     issue_comment, workflow_run, schedule or repository_dispatch. workflow_dispatch
#     can only be started by a user with write access, so forks/PRs cannot run it.
#   - Both jobs are guarded to the canonical repo (`if: github.repository == ...`), so
#     the workflow never executes in a fork — even one that registers its own runner.
#   - permissions: contents: read (least-privilege GITHUB_TOKEN).
#   - Secrets are scoped to the test step only (npm ci / browser install never see them).
# Needs a runner labelled [self-hosted, linux, playwright]; none is registered yet.
# https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
on:
  workflow_dispatch:

env:
  NODE_OPTIONS: --disable-warning=DEP0040

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, linux, playwright]
    # Never run on a self-hosted runner from a fork of this public repo.
    if: github.repository == 'ankit-at/playwright-e2e-framework'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test
        env:
          CI: true
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}
          PROTO_USER: ${{ secrets.PROTO_USER }}
          PROTO_PASS: ${{ secrets.PROTO_PASS }}
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          YAHOO_PASSWORD: ${{ secrets.YAHOO_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

      - name: Generate Allure report
        if: success()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

  load-tests:
    runs-on: [self-hosted, linux, playwright]
    # Never run on a self-hosted runner from a fork of this public repo.
    if: github.repository == 'ankit-at/playwright-e2e-framework'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run performance tests
        run: npx playwright test tests/performance.spec.ts --reporter=line
        env:
          CI: true
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}

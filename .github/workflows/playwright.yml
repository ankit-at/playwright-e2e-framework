name: Playwright Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC

# Silence the transitive punycode deprecation (DEP0040) emitted by deps like
# whatwg-url/tr46 on Node 24. Set workflow-wide so it also covers the setup-node
# post-step (cache save), where the warning surfaces — not just the test run.
env:
  NODE_OPTIONS: --disable-warning=DEP0040

# Least-privilege GITHUB_TOKEN: this workflow only reads code and runs tests — it
# never writes to the repo. Caps the blast radius if any step/dependency is compromised.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps chromium
      
      - name: Run Azure Login With a Service Principal Secret
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_SECRET }}

      - name: Run tests
        run: npx playwright test --config=playwright.service.config.ts --workers=5
        env:
          CI: true
          # Credentials — set in GitHub → Settings → Secrets and variables → Actions.
          # rahulshettyacademy account (client/events/angular/k6)
          PLAYWRIGHT_SERVICE_URL: ${{ vars.PLAYWRIGHT_SERVICE_URL }}
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}
          # ProtoCommerce loginpagePractise account
          PROTO_USER: ${{ secrets.PROTO_USER }}
          PROTO_PASS: ${{ secrets.PROTO_PASS }}
          # EventHub booking personas
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          YAHOO_PASSWORD: ${{ secrets.YAHOO_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

      # Publish the HTML report only on SUCCESS. This repo is public, so we must not
      # upload failure artifacts: Playwright traces capture login request bodies and
      # bearer tokens, and failed-test page snapshots embed filled-in password fields.
      # A green run's report contains none of that (no traces/screenshots/snapshots).
      # To debug a failure with traces, run locally (npx playwright show-trace) or make
      # the repo private and re-enable a failure-artifact upload.
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  load-tests: # perf/load only on schedule or manual — never blocks a PR
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run performance tests
        run: npx playwright test tests/performance.spec.ts --reporter=line
        env:
          CI: true
          RSA_EMAIL: ${{ secrets.RSA_EMAIL }}
          RSA_PASSWORD: ${{ secrets.RSA_PASSWORD }}
